apiVersion: apps/v1
kind: Deployment
metadata:
  name: back-despachos
  namespace: proyecto-semestral
spec:
  replicas: 2
  selector:
    matchLabels:
      app: back-despachos
  template:
    metadata:
      labels:
        app: back-despachos
    spec:
      containers:
        - name: back-despachos
          image: 637423327509.dkr.ecr.us-east-1.amazonaws.com/back-despachos:latest
          ports:
            - containerPort: 8081
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"