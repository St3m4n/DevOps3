name: CI/CD Back Ventas

on:
  push:
    branches: [ "main" ]
    paths:
      - "back-Ventas_SpringBoot/**"

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout código
      uses: actions/checkout@v3

    - name: Configurar credenciales AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: us-east-1

    - name: Login en Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build y push a ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        REPO_NAME: back-ventas
        IMAGE_TAG: ${{ github.sha }}
      run: |
        cd back-Ventas_SpringBoot
        docker build -t $ECR_REGISTRY/$REPO_NAME:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$REPO_NAME:$IMAGE_TAG

    - name: Desplegar en EKS
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        REPO_NAME: back-ventas
        IMAGE_TAG: ${{ github.sha }}
      run: |
        aws eks update-kubeconfig --region us-east-1 --name cluster-proyecto
        kubectl set image deployment/back-ventas back-ventas=$ECR_REGISTRY/$REPO_NAME:$IMAGE_TAG